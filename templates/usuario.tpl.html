{% extends "base.tpl.html" %}
{% block content %}
<form id="usuario" 
    {% if not usuario %}
    hx-post="/usuario/nuevo"
    {% else %}
    hx-patch="/usuario/{{usuario.id}}"
    {% endif %}
    hx-target="this"
    hx-swap="outerHTML"
    hx-select="#usuario"
>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="id" class="form-label">Identificador:</label>
            <input id="id" class="form-control" type="text" name="id" value="{% if usuario %}{{usuario.id}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="nombres" class="form-label">Nombres:</label>
            <input id="nombres" class="form-control" type="text" name="nombres" value="{% if usuario %}{{usuario.nombres}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="apellido_paterno" class="form-label">Apellido paterno:</label>
            <input id="apellido_paterno" class="form-control" type="text" name="apellido_paterno" value="{% if usuario %}{{usuario.apellido_paterno}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="apellido_materno" class="form-label">Apellido materno:</label>
            <input id="apellido_materno" class="form-control" type="text" name="apellido_materno" value="{% if usuario %}{{usuario.apellido_materno}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="email" class="form-label">Email:</label>
            <input id="email" class="form-control" type="email" name="email" value="{% if usuario %}{{usuario.email}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="password" class="form-label">Password:</label>
            <input id="password" class="form-control" type="password" name="password" {% if not usuario %}required{% endif %}>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="perfil" class="form-label">Perfil:</label>
            <select id="perfil" class="form-select" name="perfil" required>
                <option value="">- Seleccionar un perfil -</option>
                {% for perfil in ["Administrador","Calificador"] %}
                <option value="{{perfil}}" {% if perfil == usuario.perfil %}selected{% endif %}>{{perfil}}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="activo" name="activo" value="True" {% if not usuario or (usuario.activo)%}checked{% endif %}>
                <label class="form-check-label" for="estado">Activo</label>
            </div>
        </div>
    </div>
    <div class="container d-flex justify-content-center">
        {% if not usuario%}
        <button id="crear" class="my-4 btn btn-primary" form="usuario">Crear</button>
        {% else %}
        <button id="guardar" class="m-4 btn btn-primary" form="usuario">Guardar</button>
        <button id="eliminar" c hx-delete="/usuario/{{usuario.id}}" hx-target="body" hx-swap="outerHTML" class="my-4 btn btn-danger">Eliminar</button>
        {% endif %}
    </div>
</form>
{% endblock %}

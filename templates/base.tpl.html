<!DOCTYPE html>
<html data-bs-theme="light" lang="es-PE">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@2.0.1" integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="theme-color" content="#042354">
    {% block head %}
    {% endblock %}
    <style>
        .bg-pucp-primary{
            background-color: #042354;
        }
    </style>
    <title>{{ title }}</title>
</head>

<body class="bg-body-tertiary">
    <div id="toast" class="toast bg-success text-white align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div id="toast-body" class="toast-body">
            </div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    <main class="container-fluid gx-0 gx-sm-5">
        <div class="bg-body p-3 my-2 rounded shadow">
            {% block content %}
            {% endblock %}
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
        htmx.on("showMessage", e => {
            const toastElement = document.getElementById("toast");
            const toastBody = document.getElementById("toast-body");
    
            const toast = new bootstrap.Toast(toastElement, { delay: 3000 });
            
            //toastElement.classList.add(`bg-${e.detail['type']}`);
            toastBody.innerText = e.detail['text'];
            toast.show();
        });
    </script>
    {% block scripts %}
    {% endblock %}
</body>
</html>

<!DOCTYPE html>
<html data-bs-theme="light" lang="es-PE">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@2.0.1" integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/" crossorigin="anonymous"></script>
    <link href="/assets/css/diad-bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="theme-color" content="#042354">
    {% block head %}
    {% endblock %}
    <style>
    </style>
    <title>{{ title }}</title>
</head>

<body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-md navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">IB</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            {% if user %}
            <div class="collapse navbar-collapse justify-content-between" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Instrucciones</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/usuario/{{user.id}}/por-calificar">Listado de entrevistas</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout"><i class="bi-box-arrow-right"></i> Salir</a>
                    </li>
                </ul>
            </div>
            {% endif %}
        </div>
      </nav>
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
        <div id="toast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="toast-body" class="toast-body">
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
    <main class="container-fluid gx-0 gx-sm-5">
        <div class="bg-body p-3 my-2 rounded shadow">
            {% block content %}
            {% endblock %}
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
        htmx.on("showMessage", e => {
            const toastElement = document.getElementById("toast");
            const toastBody = document.getElementById("toast-body");
    
            const toast = new bootstrap.Toast(toastElement, { delay: 3000 });
            
            toastElement.classList.add(`bg-${e.detail['type']}`);
            if ((e.detail['type'] == 'success') || (e.detail['type'] == 'danger')){
                toastElement.classList.add('text-white');
            }
            toastBody.innerText = e.detail['text'];
            toast.show();
        });
    </script>
    {% block scripts %}
    {% endblock %}
</body>
</html>

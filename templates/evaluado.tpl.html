{% extends "base.tpl.html" %}
{% block content %}
<form id="evaluado" 
    {% if not evaluado %}
    hx-post="/evaluado/nuevo"
    {% else %}
    hx-patch="/evaluado/{{evaluado.id}}"
    {% endif %}
    hx-target="this"
    hx-swap="outerHTML"
    hx-select="#evaluado"
>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="id" class="form-label">Identificador:</label>
            <input id="id" class="form-control" type="text" name="id" value="{% if evaluado %}{{evaluado.id}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="documento_identidad" class="form-label">Número de documento:</label>
            <input id="documento_identidad" class="form-control" type="text" name="documento_identidad" value="{% if evaluado %}{{evaluado.documento_identidad}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="nombres" class="form-label">Nombres:</label>
            <input id="nombres" class="form-control" type="text" name="nombres" value="{% if evaluado %}{{evaluado.nombres}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="apellido_paterno" class="form-label">Apellido paterno:</label>
            <input id="apellido_paterno" class="form-control" type="text" name="apellido_paterno" value="{% if evaluado %}{{evaluado.apellido_paterno}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="apellido_materno" class="form-label">Apellido materno:</label>
            <input id="apellido_materno" class="form-control" type="text" name="apellido_materno" value="{% if evaluado %}{{evaluado.apellido_materno}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="carrera" class="form-label">Carrera:</label>
            <input id="carrera" class="form-control" type="text" name="carrera" value="{% if evaluado %}{{evaluado.carrera}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="edad" class="form-label">Edad:</label>
            <input id="edad" class="form-control" type="number" name="edad" value="{% if evaluado %}{{evaluado.edad}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="colegio" class="form-label">Colegio:</label>
            <input id="colegio" class="form-control" type="text" name="colegio" value="{% if evaluado %}{{evaluado.colegio}}{% endif %}" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="ensayo" class="form-label">Ensayo:</label>
            <input id="ensayo" class="form-control" type="text" name="ensayo" value="{% if evaluado %}{{evaluado.ensayo}}{% endif %}" required>
        </div>
    </div>
    <div class="container d-flex justify-content-center">
        {% if not evaluado %}
        <button id="crear" class="my-4 btn btn-primary" form="evaluado">Crear</button>
        {% else %}
        <button id="guardar" class="m-4 btn btn-primary" form="evaluado">Guardar</button>
        <button id="eliminar" c hx-delete="/evaluado/{{evaluado.id}}" hx-target="body" hx-swap="outerHTML" class="my-4 btn btn-danger">Eliminar</button>
        {% endif %}
    </div>
</form>
{% endblock %}
